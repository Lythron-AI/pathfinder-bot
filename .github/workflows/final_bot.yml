name: Build Pathfinder Bot APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        id: setup-android
        with:
          packages: 'ndk;25.2.9519653'

      - name: Build with Gradle
        # Usamos :app:assembleDebug para forzar la búsqueda en el módulo correcto
        run: |
          # Solo por seguridad, listamos archivos para confirmar la estructura
          ls -R 
          gradle :app:assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pathfinder-Bot-Debug
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
