name: Build Pathfinder Bot APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'ndk;25.2.9519653' # Formato correcto para el NDK

      - name: Build with Gradle
        # Forzamos la compilación aunque haya warnings
        run: gradle assembleDebug --stacktrace
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-android.outputs.sdk-path }}/ndk/25.2.9519653

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pathfinder-Bot-Debug
          # Buscamos en todas las subcarpetas del build por si acaso
          path: "**/build/outputs/apk/debug/*.apk"
          if-no-files-found: error
